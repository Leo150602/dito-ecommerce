
<div *ngFor="let categoria of categorias" class="container my-4">
    <div class="row align-items-center mb-3">
        <div class="col">
            <h2 class="fw-bold text-capitalize m-0">{{ categoria.nombre }}</h2>
        </div>
        <div class="col-auto">
            <button class="btn btn-outline-primary btn-sm">Ver más</button>
        </div>
    </div>
    <div class="row g-4">
        <div *ngFor="let producto of categoria.productos.slice(0, 4)" class="col-md-3">
            <app-product-details-component [producto]="producto" class="producto"></app-product-details-component>
        </div>
    </div>
</div>
