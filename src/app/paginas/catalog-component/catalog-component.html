<div *ngFor="let categoria of categorias" class="container my-4">
    <div class="row align-items-center mb-3">
        <div class="col">
            <h2 class="fw-bold text-capitalize m-0">{{ categoria.nombre }}</h2>
        </div>
        <div class="col-auto">
            <button *ngIf="categorias.length != 1" class="btn btn-outline-primary btn-sm" [routerLink]="['/catalog', categoria.nombre]">Ver más</button>
        </div>
    </div>
    <div class="row g-4">
        <div *ngFor="let producto of categoria.productos.slice(0, cantidadMostrada)" class="col-12 col-md-6 col-lg-3">
            <div class="card h-100 shadow-sm border-0 producto" [routerLink]="['/product',producto.id]">
                <div class="p-3 d-flex justify-content-center">
                    <img [src]="producto.foto" [alt]="producto.nombre" class="card-img-top producto-imagen">
                </div>
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ producto.nombre }}</h5>
                    <p class="card-text text-muted descripcion">{{ producto.descripcion }}</p>
                    <div class="mt-auto d-flex justify-content-between align-items-center">
                        <p class="fw-bold text-primary fs-4 mb-0 precio">${{ producto.precio }}</p>
                        <button class="btn btn-sm px-3 rounded-pill shadow-sm d-flex align-items-center gap-2 fw-semibold" [ngClass]="compararCarrito(producto.id)?'btn-danger':'btn-primary'"
                                (click)="enviarAlCarrito($event, producto)">
                            <i class="bi bi-cart-plus fs-5"></i>
                            {{compararCarrito(producto.id)?"eliminar":"agregar"}}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
