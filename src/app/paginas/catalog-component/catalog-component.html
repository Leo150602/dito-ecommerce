<div *ngFor="let categoria of categorias" class="container my-4">
    <div class="row align-items-center mb-3">
        <div class="col">
            <h2 class="fw-bold text-capitalize m-0">{{ categoria.nombre }}</h2>
        </div>
        <div class="col-auto">
            <button *ngIf="categorias.length != 1" class="btn btn-outline-primary btn-sm" [routerLink]="['/catalog', categoria.nombre]">Ver más</button>
        </div>
    </div>
    <div class="row g-4">
        <div *ngFor="let producto of categoria.productos.slice(0, cantidadMostrada)" class="col-md-3">
            <div class="card h-100 shadow-sm border-0 producto">
                <div class="p-3 d-flex justify-content-center">
                    <img [src]="producto.foto" [alt]="producto.nombre" class="card-img-top producto-imagen">
                </div>
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ producto.nombre }}</h5>
                    <p class="card-text text-muted descripcion">{{ producto.descripcion }}</p>
                    <div class="mt-auto">
                    <p class="fw-bold text-primary fs-5 mb-0 precio">${{ producto.precio }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
